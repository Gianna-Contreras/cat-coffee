<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | Cat Coffee</title>
    <link rel="stylesheet" href="contacto.css">
</head>
<body>

<section class="contacto">

    <!-- Banner superior -->
    <div class="banner">

        <!-- Gato arriba a la izquierda pero DENTRO -->
        <img src="../img/cat-contact.png" class="banner-gato" alt="Gato contacto">

        <div class="banner-texto">
            <h1>🐾 Contacto Cat Coffee ✨</h1>
            <p>¡Nos encantará saber de vos! Elegí tu canal favorito para escribirnos.</p>
        </div>

    </div>

    <!-- Tarjetas -->
    <div class="cards">

        <div class="card">
            <img src="../img/telefono-1.png" class="card-img" alt="Correo">
            <h3>Correo Electrónico</h3>
            <p>info@catcoffee.com</p>
            <button>Enviar correo</button>
        </div>

        <div class="card">
            <img src="../img/carta-1.png" class="card-img" alt="Teléfono">
            <h3>Llamanos</h3>
            <p>(123) 456-7890</p>
            <button>Llamar ahora</button>
        </div>

        <div class="card">
            <img src="../img/llamada-1.png" class="card-img" alt="Redes">
            <h3>Nuestras Redes</h3>
            <p>Seguinos y envianos un mensaje directo.</p>
            <button>Enviar mensaje</button>
        </div>

    </div>

</section>

</body>
</html>
