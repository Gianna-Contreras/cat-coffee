<div class="perfil-container">
  <div class="perfil-card">

    <div class="perfil-header">
      <img src="img/coco-1.png" class="coco-1-header">
      <h2>🐾 Editar Perfil</h2>
    </div>

    <div class="perfil-content">

      <div class="avatar-section">
        <img src="img/avatar.png" class="avatar-img" id="avatarPreview">
        <button class="btn-foto" id="btnCambiarFoto">📷 Cambiar foto</button>
        <input type="file" id="inputFoto" hidden>
      </div>

      <div class="form-section">

        <label>Nombre</label>
        <input type="text" placeholder="Señor-bigotes">

        <label>Correo Electrónico</label>
        <input type="email" placeholder="señor-bigotes666@gmail.com">

        <div class="row">
          <div class="col">
            <label>Usuario</label>
            <input type="text" placeholder="Señor-bigotes">
          </div>

          <div class="col">
            <label>Contraseña</label>
            <div class="password-box">
              <input type="password" id="password">
              <span id="togglePass">👁</span>
            </div>
          </div>
        </div>

        <div class="acciones">
          <button class="btn-cancelar">Cancelar</button>
          <button class="btn-guardar">Guardar</button>
        </div>

      </div>

    </div>

  </div>
</div>
