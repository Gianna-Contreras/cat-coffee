<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Coffee - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Logo y título -->
        <div class="login-header">
            <img src="../img/logo-cat-coffee.png" alt="Cat Coffee" class="login-logo" onerror="this.src='https://via.placeholder.com/90x90/fff56b/333?text=🐱'">
            <h1>Cat Coffee</h1>
            <p class="subtitle">¡Hola de nuevo! 🐾</p>
        </div>

        <!-- Formulario de login -->
        <form id="login-form" class="login-form">
            <div class="input-group">
                <label for="username">Usuario o Email</label>
                <input type="text" id="username" placeholder="Ej: nicol, gato_fan, etc." required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="login-btn">
                Iniciar Sesión
            </button>
        </form>

        <!-- Botón Invitado -->
        <button type="button" id="guest-btn" class="guest-btn">
            Entrar como Invitado 🐱
        </button>

        <!-- Mensaje de error -->
        <div id="error-message" class="error-message"></div>

        <!-- Pie -->
        <div class="login-footer">
            <p>¿Nuevo por aquí? <a href="#" id="register-link">Crear cuenta</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
