<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración - Cat Coffee</title>
    <link rel="stylesheet" href="configuracion.css">
</head>
<body>

<div class="config-container">

    <!-- Banner Superior -->
    <div class="config-banner">
        <img src="img/pattita.png" class="banner-pattita">
        <div class="banner-text">
            <h1>Configuración Cat Coffee</h1>
            <p>Personalizá tu experiencia y ajustá las opciones de la app</p>
        </div>
    </div>

    <!-- Tarjetas -->
    <div class="config-cards">

        <!-- Notificaciones -->
        <div class="card">
            <img src="img/capana.png" class="card-icon">
            <h2>Notificaciones</h2>
            <p>Ajustá tus preferencias de notificación.</p>
            <button class="btn">
                <img src="img/pattita.png" class="btn-icon">
                Ajustar
            </button>
        </div>

        <!-- Privacidad -->
        <div class="card">
            <img src="img/escudo.png" class="card-icon">
            <h2>Privacidad</h2>
            <p>Gestioná tus preferencias de privacidad</p>
            <button class="btn">
                <img src="img/pattita.png" class="btn-icon">
                Configurar
            </button>
        </div>


        <div class="card">
            <img src="img/tel.png" class="card-icon">
            <h2>Tema de la App</h2>
            <p>Seleccioná el modo claro u oscuro,para adaptar la app</p>
            <button class="btn">
                <img src="img/pattita.png" class="btn-icon">
                Cambiar tema
            </button>
        </div>

    
    </div>

    <!-- Gatito decorativo -->
    <div class="cat-deco">
        <img src="img/tel-1.png">
    </div>

</div>

<script src="configuracion.js"></script>
</body>
</html>
